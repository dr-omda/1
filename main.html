<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/063e587367c1d1106ff80aaadeede5/69dbccd41fdb9c954f8bc04d/sh_1776012550204.jpg" type="image/jpeg">
    <title>About Dr. Emad</title>
    <style>
        :root {
            --bg-dark: radial-gradient(circle at 20% 10%, #2a3b6e 0%, #111828 45%, #02040a 100%);
            --bg-light: radial-gradient(circle at top right, rgba(255,255,255,0.95) 0%, rgba(221,235,255,0.95) 35%, rgba(235,245,255,0.9) 100%);
            --bg-color-dark: #02040a;
            --bg-color-light: #f3f7ff;
            --bg: var(--bg-dark);
            --text-color: #f0f0f0;
            --text-color-light: #111;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-bg-light: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-border-light: rgba(0, 0, 0, 0.08);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            background-color: var(--bg-color-dark);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body.light-mode {
            --bg: var(--bg-light);
            --bg-color-dark: var(--bg-color-light);
            --text-color: var(--text-color-light);
            --glass-bg: var(--glass-bg-light);
            --glass-border: var(--glass-border-light);
        }

        body.light-mode .glass-card {
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
        }

        body.light-mode .glass-card p {
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }

        header {
            display: grid;
            place-items: center;
            margin-bottom: 50px;
        }

        header.glass-card {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 35px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
            width: fit-content;
            max-width: 95%;
            margin: 0 auto;
            animation: glow-border 3.5s ease-in-out infinite;
        }

        header.glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        header.glass-card:hover::after {
            opacity: 1;
        }

        @keyframes glow-border {
            0%, 100% {
                box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12), 0 0 20px rgba(0, 210, 255, 0.1);
            }
            50% {
                box-shadow: 0 16px 44px rgba(0, 0, 0, 0.14), 0 0 32px rgba(0, 210, 255, 0.2);
            }
        }

        h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .mode-toggle button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        body.light-mode .mode-toggle button {
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            border-color: rgba(0, 0, 0, 0.12);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .mode-toggle button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
        }

        .mode-toggle button span {
            font-size: 1.1rem;
            line-height: 1;
        }

        /* معرض الصور المكون من 5 صور */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }

        .photo-gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid var(--glass-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .photo-gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        /* حاويات الفقرات */
        .content-section {
            display: grid;
            gap: 30px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card h2 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .glass-card p {
            font-size: 1.1rem;
            color: #ccc;
        }

        @media (max-width: 600px) {
            .photo-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="glass-card">
            <h1>About Dr. Emad</h1>
        </header>
        <br>
        <br>
        <div class="mode-toggle">
            <button id="themeToggle"><span>☀️</span></button>
        </div>
        <section class="photo-gallery">
            <img src="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69deaa0f1fdb9c954fbf8c48/sh_1776200323127.jpg" alt="صورة 1">
            <img src="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69deaa0f1fdb9c954fbf8c48/sh_1776200309944.jpg" alt="صورة 2">
            <img src="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69deaa0f1fdb9c954fbf8c48/sh_1776200322399.jpg" alt="صورة 3">
            <img src="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69deaa0f1fdb9c954fbf8c48/sh_1776200306726.jpg" alt="صورة 4">
            <img src="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69deaad00ade6f5ad2a1e99a/sh_1776200436662.jpg" alt="صورة 5">
        </section>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const rootBody = document.body;
        const storedTheme = localStorage.getItem('themeMode');

        const updateToggleText = () => {
            const isLight = rootBody.classList.contains('light-mode');
            themeToggle.innerHTML = isLight ? '<span>🌙</span>' : '<span>☀️</span>';
        };

        if (storedTheme === 'light') {
            rootBody.classList.add('light-mode');
        }

        updateToggleText();

        themeToggle.addEventListener('click', () => {
            const isLight = rootBody.classList.toggle('light-mode');
            localStorage.setItem('themeMode', isLight ? 'light' : 'dark');
            updateToggleText();
        });
    </script>
</body>
