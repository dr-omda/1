    <meta charset="UTF-8">

    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --footer-bg: #2d3436;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --accent-glow: #00b894;
            --bg-image: url('https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/cd0c33b0594e4433d1a8ca61f11ef7/69deaca2001e39939d6a20c7/sh_1776200991465.jpg');
        }

        .dark-mode {
            --bg-body: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #f5f5f5;
            --text-sub: #b2bec3;
            --footer-bg: #000000;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --accent-glow: #00cec9;
            --bg-image: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
        }

        body {
            background: var(--bg-image);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* لتوسيط المحتوى عمودياً لسناب */
            transition: background 0.3s ease;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(8px) brightness(0.7);
            opacity: 0.8;
            z-index: -1;
        }

        .dark-mode body::before {
            display: none;
        }

        .card-id {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .toggle-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .switch { 
            position: relative; 
            display: inline-flex;
            align-items: center;
            gap: 0;
            width: auto;
            height: auto;
            cursor: pointer;
        }
        .switch input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
            position: absolute;
        }
        .toggle-icon {
            font-size: 22px;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .sun-icon {
            display: inline-block;
        }
        .moon-icon {
            display: none;
        }
        .switch input:checked ~ .toggle-icon {
            transform: rotate(180deg);
        }
        .switch input:checked ~ .toggle-icon .sun-icon {
            display: none;
        }
        .switch input:checked ~ .toggle-icon .moon-icon {
            display: inline-block;
        }

        .slider {
            display: none;
        }
        .slider:before {
            display: none;
        }
        input:checked + .slider { display: none; }
        input:checked + .slider:before { display: none; }

        .header-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-top: 40px;
        }

        @keyframes blink-glow {
            0% { box-shadow: 0 0 10px var(--accent-glow); }
            50% { box-shadow: 0 0 25px var(--accent-glow), 0 0 40px var(--accent-glow); }
            100% { box-shadow: 0 0 10px var(--accent-glow); }
        }

        .profile-img {
            width: 230px; /* تقليل الحجم قليلاً ليناسب الشاشات الطويلة */
            height: 230px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--bg-card);
            background: #fff;
            animation: blink-glow 2s infinite ease-in-out;
        }

        .profile-img img { width: 100%; height: 100%; object-fit: cover; }

        .info-card {
            text-align: center;
            margin-top: 15px;
        }

        .info-card h1 { margin: 0; font-size: 26px; font-weight: 700; color: var(--text-main); }
        .info-card p { margin: 5px 0; font-size: 18px; color: var(--accent-glow); font-weight: 600; }

        /* تعديل ألوان النص في الوضع الفاتح للوضوح مع الخلفية */
        body:not(.dark-mode) .info-card h1 {
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        body:not(.dark-mode) .info-card p {
            color: #3cbeed;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes clickEffect {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .container {
            width: 85%;
            max-width: 380px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: appear 0.8s ease-out;
        }

        .slide {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 18px 12px 50px;
            background: var(--bg-card);
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            border-right: 5px solid transparent;
            text-align: center;
            animation: appear 0.6s ease-out forwards;
            opacity: 0;
        }

        .slide.clicked {
            animation: clickEffect 0.2s ease;
        }

        .slide:nth-child(1) { animation-delay: 0.2s; }
        .slide:nth-child(2) { animation-delay: 0.4s; }
        .slide:nth-child(3) { animation-delay: 0.6s; }
        .slide:nth-child(4) { animation-delay: 0.8s; }
        .slide:nth-child(5) { animation-delay: 1.0s; }
        .slide:nth-child(6) { animation-delay: 1.2s; }
        .slide:nth-child(7) { animation-delay: 1.4s; }
        .slide:nth-child(8) { animation-delay: 1.6s; }

        .slide:hover { transform: scale(1.03); }
        .icon {
            position: absolute;
            left: 18px;
            width: 22px;
            height: 22px;
            margin: 0;
        }

        .fb { border-right-color: #1877f2; }
        .ig { border-right-color: #e1306c; }

        .tg { border-right-color: #0088cc; }
        .sc { border-right-color: #fffc00; }

        footer {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: var(--text-sub);
        }
        footer a { color: var(--text-main); text-decoration: none; font-weight: bold; }

    <script>
        const toggle = document.getElementById('darkModeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            toggle.checked = true;
        }

        toggle.addEventListener('change', () => {
            if (toggle.checked) {
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });

        // Click animation for slides
        const slides = document.querySelectorAll('.slide');
        slides.forEach(slide => {
            slide.addEventListener('click', () => {
                slide.classList.add('clicked');
                setTimeout(() => {
                    slide.classList.remove('clicked');
                }, 200);
            });
        });
    </script>
